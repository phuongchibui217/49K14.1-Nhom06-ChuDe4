<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Spa ANA</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts - Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        
        .register-container {
            max-width: 600px;
            width: 100%;
            padding: 2rem;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem 2rem;
            animation: fadeInUp 0.6s ease;
        }
        
        .register-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .register-logo i {
            font-size: 4rem;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .register-logo h2 {
            margin-top: 1rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        
        .form-floating {
            margin-bottom: 1.5rem;
        }
        
        .form-floating label {
            color: #6c757d;
        }
        
        .form-control {
            border-radius: 12px;
            border: 2px solid #e9ecef;
            padding: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 0.2rem rgba(212, 168, 55, 0.15);
            outline: none;
        }
        
        .is-invalid {
            border-color: #dc3545 !important;
        }
        
        .field-error {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .is-invalid + .field-error {
            display: block;
        }
        
        .btn-register {
            background: var(--gradient-gold);
            border: none;
            padding: 1rem;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 12px;
            transition: all 0.3s ease;
            color: white;
            width: 100%;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
            background: var(--gradient-gold);
            color: white;
        }
        
        .btn-register:active {
            transform: translateY(0);
        }
        
        .password-requirements {
            font-size: 0.8rem;
            color: #6c757d;
            margin-top: 0.5rem;
            padding: 0.75rem;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .password-requirements ul {
            padding-left: 1.5rem;
            margin-bottom: 0;
        }
        
        .password-requirements li {
            margin-bottom: 0.25rem;
        }
        
        .password-requirements li i {
            color: var(--gold-primary);
            margin-right: 0.5rem;
        }
        
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .register-link a {
            color: var(--gold-primary);
            font-weight: 600;
        }
        
        .custom-alert {
            border-radius: 12px;
            border: none;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
        }
        
        .required-mark {
            color: #dc3545;
        }
        
        .optional-text {
            font-size: 0.85rem;
            color: #6c757d;
            font-weight: 400;
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        /* Responsive */
        @media (max-width: 576px) {
            body {
                padding: 1rem;
            }
            
            .register-card {
                padding: 2rem 1.5rem;
            }
            
            .register-logo i {
                font-size: 3rem;
            }
            
            .btn-register {
                font-size: 1rem;
                padding: 0.875rem;
            }
        }
    </style>
</head>
<body>
    
    <div class="register-container">
        <div class="register-card">
            <div class="register-logo">
                <i class="fas fa-spa"></i>
                <h2>Spa ANA</h2>
            </div>
            
            <h4 class="text-center mb-4">Đăng Ký Tài Khoản</h4>
            
            <!-- Alert Container -->
            <div id="registerAlert"></div>
            
            <!-- Single-Step Registration Form -->
            <form id="registerForm" novalidate>
                
                <!-- Họ và tên -->
                <div class="form-floating">
                    <input type="text" class="form-control" id="fullName" placeholder="Họ và tên" required>
                    <label for="fullName">
                        <i class="fas fa-user me-2"></i>Họ và tên
                        <span class="required-mark">*</span>
                    </label>
                    <div class="field-error" id="fullNameError"></div>
                </div>
                
                <!-- Số điện thoại -->
                <div class="form-floating">
                    <input type="tel" class="form-control" id="phone" placeholder="Số điện thoại" required>
                    <label for="phone">
                        <i class="fas fa-phone me-2"></i>Số điện thoại
                        <span class="required-mark">*</span>
                    </label>
                    <div class="field-error" id="phoneError"></div>
                    <small class="text-muted">10 số, bắt đầu bằng số 0</small>
                </div>
                
                <!-- Email -->
                <div class="form-floating">
                    <input type="email" class="form-control" id="email" placeholder="Email" required>
                    <label for="email">
                        <i class="fas fa-envelope me-2"></i>Email
                        <span class="required-mark">*</span>
                    </label>
                    <div class="field-error" id="emailError"></div>
                    <small class="text-muted">Để nhận thông tin và ưu đãi</small>
                </div>
                
                <!-- Ngày sinh -->
                <div class="form-floating">
                    <input type="date" class="form-control" id="dob" placeholder="Ngày sinh">
                    <label for="dob">
                        <i class="fas fa-calendar me-2"></i>Ngày sinh
                        <span class="optional-text">(không bắt buộc)</span>
                    </label>
                    <div class="field-error" id="dobError"></div>
                </div>
                
                <!-- Mật khẩu -->
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" placeholder="Mật khẩu" required>
                    <label for="password">
                        <i class="fas fa-lock me-2"></i>Mật khẩu
                        <span class="required-mark">*</span>
                    </label>
                    <div class="field-error" id="passwordError"></div>
                    
                    <div class="password-requirements">
                        <strong>Mật khẩu phải có:</strong>
                        <ul>
                            <li><i class="fas fa-check-circle"></i>Tối thiểu 10 ký tự</li>
                            <li><i class="fas fa-check-circle"></i>Ít nhất 1 chữ hoa</li>
                            <li><i class="fas fa-check-circle"></i>Ít nhất 1 chữ thường</li>
                            <li><i class="fas fa-check-circle"></i>Ít nhất 1 số</li>
                            <li><i class="fas fa-check-circle"></i>Ít nhất 1 ký tự đặc biệt (!@#$%^&*)</li>
                        </ul>
                    </div>
                </div>
                
                <!-- Xác nhận mật khẩu -->
                <div class="form-floating">
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Xác nhận mật khẩu" required>
                    <label for="confirmPassword">
                        <i class="fas fa-lock me-2"></i>Xác nhận mật khẩu
                        <span class="required-mark">*</span>
                    </label>
                    <div class="field-error" id="confirmPasswordError"></div>
                </div>
                
                <!-- Đồng ý điều khoản -->
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                    <label class="form-check-label" for="agreeTerms">
                        Tôi đồng ý với 
                        <a href="#" class="text-decoration-none me-1">Điều khoản sử dụng</a> 
                        và 
                        <a href="#" class="text-decoration-none ms-1">Chính sách bảo mật</a>
                    </label>
                    <div class="field-error" id="agreeTermsError"></div>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="btn btn-register">
                    <i class="fas fa-user-plus me-2"></i>Đăng Ký
                </button>
                
            </form>
            
            <div class="register-link">
                <p class="mb-2">Đã có tài khoản?</p>
                <a href="login.html">Đăng nhập ngay</a>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/main.js"></script>
    
    <script>
        // ========================================
        // REGISTRATION FORM VALIDATION
        // ========================================
        
        // Form submission
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Clear previous errors
            clearErrors();
            
            // Get form values
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const dob = document.getElementById('dob').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            let isValid = true;
            
            // ========================================
            // VALIDATION RULES
            // ========================================
            
            // 1. Validate Full Name: minimum 2 characters
            if (!fullName || fullName.length < 2) {
                showError('fullName', '<i class="fas fa-exclamation-circle"></i>Vui lòng nhập họ tên hợp lệ (tối thiểu 2 ký tự)');
                isValid = false;
            }
            
            // 2. Validate Phone Number: digits only, length = 10, starts with 0
            if (!phone || !/^[0-9]{10}$/.test(phone)) {
                showError('phone', '<i class="fas fa-exclamation-circle"></i>Vui lòng nhập số điện thoại hợp lệ (10 số, bắt đầu bằng số 0)');
                isValid = false;
            }
            
            // 3. Validate Email: valid email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                showError('email', '<i class="fas fa-exclamation-circle"></i>Vui lòng nhập email hợp lệ');
                isValid = false;
            }
            
            // DOB is optional - no validation needed
            
            // 4. Validate Password: minimum 10 characters
            if (!password || password.length < 10) {
                showError('password', '<i class="fas fa-exclamation-circle"></i>Mật khẩu phải có tối thiểu 10 ký tự');
                isValid = false;
            }
            
            // 5. Validate Password: at least 1 uppercase
            if (!/[A-Z]/.test(password)) {
                showError('password', '<i class="fas fa-exclamation-circle"></i>Mật khẩu phải có ít nhất 1 chữ hoa');
                isValid = false;
            }
            
            // 6. Validate Password: at least 1 lowercase
            if (!/[a-z]/.test(password)) {
                showError('password', '<i class="fas fa-exclamation-circle"></i>Mật khẩu phải có ít nhất 1 chữ thường');
                isValid = false;
            }
            
            // 7. Validate Password: at least 1 number
            if (!/\d/.test(password)) {
                showError('password', '<i class="fas fa-exclamation-circle"></i>Mật khẩu phải có ít nhất 1 số');
                isValid = false;
            }
            
            // 8. Validate Password: at least 1 special character
            if (!/[!@#$%^&*]/.test(password)) {
                showError('password', '<i class="fas fa-exclamation-circle"></i>Mật khẩu phải có ít nhất 1 ký tự đặc biệt (!@#$%^&*)');
                isValid = false;
            }
            
            // 9. Validate Confirm Password: must match password
            if (!confirmPassword || password !== confirmPassword) {
                showError('confirmPassword', '<i class="fas fa-exclamation-circle"></i>Mật khẩu xác nhận không khớp');
                isValid = false;
            }
            
            // 10. Validate Terms Checkbox: must be checked
            if (!agreeTerms) {
                showError('agreeTerms', '<i class="fas fa-exclamation-circle"></i>Bạn phải đồng ý với điều khoản sử dụng');
                isValid = false;
            }
            
            // Check for duplicate phone (simulated)
            if (phone === '0901234567') {
                showError('phone', '<i class="fas fa-exclamation-circle"></i>Số điện thoại đã được đăng ký. Vui lòng sử dụng số khác.');
                isValid = false;
            }
            
            // If validation fails, don't submit
            if (!isValid) {
                return;
            }
            
            // ========================================
            // SIMULATE REGISTRATION
            // ========================================
            
            simulateRegistration({
                fullName: fullName,
                phone: phone,
                email: email,
                dob: dob,
                password: password
            });
        });
        
        // ========================================
        // ERROR DISPLAY
        // ========================================
        
        function showError(field, message) {
            const errorElement = document.getElementById(field + 'Error');
            const inputElement = document.getElementById(field);
            
            if (errorElement && inputElement) {
                errorElement.innerHTML = message;
                errorElement.style.display = 'block';
                inputElement.classList.add('is-invalid');
                
                // Scroll to first error
                errorElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
        
        function clearErrors() {
            const errorElements = document.querySelectorAll('.field-error');
            const inputElements = document.querySelectorAll('.is-invalid');
            
            errorElements.forEach(el => {
                el.style.display = 'none';
                el.innerHTML = '';
            });
            
            inputElements.forEach(el => {
                el.classList.remove('is-invalid');
            });
            
            // Clear alert
            document.getElementById('registerAlert').innerHTML = '';
        }
        
        // ========================================
        // ALERT DISPLAY
        // ========================================
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('registerAlert');
            const icons = {
                success: 'fa-check-circle',
                danger: 'fa-exclamation-circle',
                info: 'fa-info-circle'
            };
            
            alertContainer.innerHTML = `
                <div class="alert alert-${type} custom-alert d-flex align-items-center" role="alert">
                    <i class="fas ${icons[type]} me-3 fs-5"></i>
                    <div>${message}</div>
                </div>
            `;
        }
        
        // ========================================
        // SIMULATE REGISTRATION
        // ========================================
        
        function simulateRegistration(userData) {
            showAlert('Đang xử lý đăng ký...', 'info');
            
            // Simulate API call
            setTimeout(function() {
                // Success message as specified
                showAlert(
                    '<strong>Đăng ký thành công!</strong> Vui lòng đăng nhập.',
                    'success'
                );
                
                // Log registration data (simulated)
                console.log('Registered user:', userData);
                
                // Redirect to login.html after 2 seconds
                setTimeout(function() {
                    window.location.href = 'login.html';
                }, 2000);
            }, 1500);
        }
    </script>
</body>
</html>
