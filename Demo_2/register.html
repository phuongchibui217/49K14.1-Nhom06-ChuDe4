<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Spa ANA</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts - Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        
        .register-container {
            max-width: 600px;
            width: 100%;
            padding: 2rem;
        }
        
        .register-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 3rem 2rem;
            animation: fadeInUp 0.6s ease;
        }
        
        .register-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .register-logo i {
            font-size: 4rem;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .register-logo h2 {
            margin-top: 1rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        
        .form-floating label {
            color: #6c757d;
        }
        
        .btn-register {
            background: var(--gradient-gold);
            border: none;
            padding: 1rem;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            color: white;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold);
            background: var(--gradient-gold);
            color: white;
        }
        
        .btn-otp {
            background: var(--gradient-spa);
            border: none;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
            color: white;
        }
        
        .btn-otp:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            background: var(--gradient-spa);
            color: white;
        }
        
        .password-requirements {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 0.5rem;
            padding: 0.75rem;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .password-requirements ul {
            padding-left: 1.5rem;
            margin-bottom: 0;
        }
        
        .password-requirements li {
            margin-bottom: 0.25rem;
        }
        
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .register-link a {
            color: var(--gold-primary);
            font-weight: 600;
        }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e2e8f0;
            color: #6c757d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin: 0 0.5rem;
            transition: all 0.3s ease;
        }
        
        .step.active {
            background: var(--gradient-gold);
            color: white;
        }
        
        .step.completed {
            background: var(--success-color);
            color: white;
        }
        
        .form-step {
            display: none;
        }
        
        .form-step.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>
    
    <div class="register-container">
        <div class="register-card">
            <div class="register-logo">
                <i class="fas fa-spa"></i>
                <h2>Spa ANA</h2>
            </div>
            
            <h4 class="text-center mb-4">Đăng Ký Tài Khoản</h4>
            
            <!-- Alert Container -->
            <div id="registerAlert"></div>
            
            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step active" id="step1-indicator">1</div>
                <div class="step" id="step2-indicator">2</div>
                <div class="step" id="step3-indicator">3</div>
            </div>
            
            <!-- Step 1: Enter Phone Number -->
            <div class="form-step active" id="step1">
                <div class="form-floating mb-3">
                    <input type="tel" class="form-control" id="phone" placeholder="Số điện thoại" pattern="[0-9]{10}" required>
                    <label for="phone"><i class="fas fa-phone me-2"></i>Số điện thoại</label>
                    <div class="field-error" id="phoneError" style="display: none;"></div>
                </div>
                
                <button type="button" class="btn btn-otp w-100" onclick="sendOTP()">
                    <i class="fas fa-paper-plane me-2"></i>Gửi mã OTP
                </button>
            </div>
            
            <!-- Step 2: Verify OTP -->
            <div class="form-step" id="step2">
                <p class="text-center mb-3">Mã OTP đã được gửi đến số điện thoại của bạn</p>
                
                <div class="otp-container">
                    <input type="text" class="otp-input" maxlength="1" id="otp1" onkeyup="moveToNext(this, 'otp2')">
                    <input type="text" class="otp-input" maxlength="1" id="otp2" onkeyup="moveToNext(this, 'otp3')">
                    <input type="text" class="otp-input" maxlength="1" id="otp3" onkeyup="moveToNext(this, 'otp4')">
                    <input type="text" class="otp-input" maxlength="1" id="otp4" onkeyup="moveToNext(this, 'otp5')">
                    <input type="text" class="otp-input" maxlength="1" id="otp5" onkeyup="moveToNext(this, 'otp6')">
                    <input type="text" class="otp-input" maxlength="1" id="otp6" onkeyup="handleOTPComplete()">
                </div>
                
                <div class="otp-timer" id="otpTimer">
                    Thời gian còn lại: <span id="timerCount">180</span> giây
                </div>
                
                <div class="text-center mt-3">
                    <button type="button" class="btn btn-link text-decoration-none" id="resendOTP" onclick="sendOTP()" disabled>
                        Gửi lại OTP
                    </button>
                </div>
            </div>
            
            <!-- Step 3: Complete Registration -->
            <div class="form-step" id="step3">
                <form id="registerForm" novalidate>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="fullName" placeholder="Họ và tên" required>
                        <label for="fullName"><i class="fas fa-user me-2"></i>Họ và tên</label>
                        <div class="field-error" id="fullNameError" style="display: none;"></div>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="email" placeholder="Email" required>
                        <label for="email"><i class="fas fa-envelope me-2"></i>Email</label>
                        <div class="field-error" id="emailError" style="display: none;"></div>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="date" class="form-control" id="dob" required>
                        <label for="dob"><i class="fas fa-calendar me-2"></i>Ngày sinh</label>
                        <div class="field-error" id="dobError" style="display: none;"></div>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="password" placeholder="Mật khẩu" required>
                        <label for="password"><i class="fas fa-lock me-2"></i>Mật khẩu</label>
                        <div class="field-error" id="passwordError" style="display: none;"></div>
                    </div>
                    
                    <div class="password-requirements mb-3">
                        <strong>Mật khẩu phải có:</strong>
                        <ul>
                            <li>Tối thiểu 10 ký tự</li>
                            <li>Ít nhất 1 chữ hoa</li>
                            <li>Ít nhất 1 chữ thường</li>
                            <li>Ít nhất 1 số</li>
                            <li>Ít nhất 1 ký tự đặc biệt</li>
                        </ul>
                    </div>
                    
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Xác nhận mật khẩu" required>
                        <label for="confirmPassword"><i class="fas fa-lock me-2"></i>Xác nhận mật khẩu</label>
                        <div class="field-error" id="confirmPasswordError" style="display: none;"></div>
                    </div>
                    
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                        <label class="form-check-label" for="agreeTerms">
                            Tôi đồng ý với <a href="#" class="text-decoration-none">Điều khoản sử dụng</a> và <a href="#" class="text-decoration-none">Chính sách bảo mật</a>
                        </label>
                        <div class="field-error" id="agreeTermsError" style="display: none;"></div>
                    </div>
                    
                    <button type="submit" class="btn btn-warning btn-register w-100 mb-3">
                        <i class="fas fa-user-plus me-2"></i>Đăng Ký
                    </button>
                </form>
            </div>
            
            <div class="register-link">
                <p class="mb-2">Đã có tài khoản?</p>
                <a href="login.html">Đăng nhập ngay</a>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="js/main.js"></script>
    
    <script>
        let otpTimerInterval;
        let generatedOTP = '';
        let userPhone = '';
        
        // Send OTP
        function sendOTP() {
            const phone = document.getElementById('phone').value;
            
            // Validate phone
            if (!phone || !/^[0-9]{10}$/.test(phone)) {
                showError('phone', 'Vui lòng nhập số điện thoại hợp lệ (10 số)');
                return;
            }
            
            // Check if phone exists (simulated)
            if (phone === '0901234567') {
                showAlert('Số điện thoại đã được đăng ký. Vui lòng sử dụng số khác.', 'danger');
                return;
            }
            
            // Generate OTP (simulated - 6 digits)
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            userPhone = phone;
            
            // Show success message
            showAlert(`Mã OTP của bạn là: ${generatedOTP} (Demo purpose)`, 'success');
            
            // Move to step 2
            showStep(2);
            
            // Start timer
            startOTPTimer();
            
            // Focus first OTP input
            setTimeout(() => {
                document.getElementById('otp1').focus();
            }, 500);
        }
        
        // OTP Timer
        function startOTPTimer() {
            let timeLeft = 180; // 3 minutes
            const timerElement = document.getElementById('timerCount');
            const resendButton = document.getElementById('resendOTP');
            
            resendButton.disabled = true;
            
            otpTimerInterval = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(otpTimerInterval);
                    timerElement.textContent = '0';
                    resendButton.disabled = false;
                    showAlert('Mã OTP đã hết hạn. Vui lòng gửi lại.', 'warning');
                }
            }, 1000);
        }
        
        // Move to next OTP input
        function moveToNext(current, nextId) {
            if (current.value.length === 1) {
                document.getElementById(nextId).focus();
            }
        }
        
        // Handle OTP complete
        function handleOTPComplete() {
            const otp = Array.from(document.querySelectorAll('.otp-input'))
                .map(input => input.value)
                .join('');
            
            if (otp.length === 6) {
                verifyOTP(otp);
            }
        }
        
        // Verify OTP
        function verifyOTP(otp) {
            if (otp === generatedOTP) {
                // Success
                clearInterval(otpTimerInterval);
                showAlert('Xác thực OTP thành công!', 'success');
                
                // Move to step 3
                setTimeout(() => {
                    showStep(3);
                }, 1000);
            } else {
                showAlert('Mã OTP không chính xác. Vui lòng thử lại.', 'danger');
                
                // Clear OTP inputs
                document.querySelectorAll('.otp-input').forEach(input => {
                    input.value = '';
                });
                document.getElementById('otp1').focus();
            }
        }
        
        // Show step
        function showStep(stepNumber) {
            // Hide all steps
            document.querySelectorAll('.form-step').forEach(step => {
                step.classList.remove('active');
            });
            
            // Update indicators
            document.querySelectorAll('.step').forEach((indicator, index) => {
                indicator.classList.remove('active', 'completed');
                if (index + 1 < stepNumber) {
                    indicator.classList.add('completed');
                } else if (index + 1 === stepNumber) {
                    indicator.classList.add('active');
                }
            });
            
            // Show current step
            document.getElementById('step' + stepNumber).classList.add('active');
        }
        
        // Register form submission
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Clear previous errors
            clearErrors();
            
            // Validate form
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const dob = document.getElementById('dob').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            let isValid = true;
            
            // Validate full name
            if (!fullName || fullName.length < 2) {
                showError('fullName', 'Vui lòng nhập họ tên hợp lệ');
                isValid = false;
            }
            
            // Validate email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                showError('email', 'Vui lòng nhập email hợp lệ');
                isValid = false;
            }
            
            // Validate DOB
            if (!dob) {
                showError('dob', 'Vui lòng chọn ngày sinh');
                isValid = false;
            }
            
            // Validate password strength
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{10,}$/;
            if (!password || !passwordRegex.test(password)) {
                showError('password', 'Mật khẩu không đáp ứng yêu cầu. Vui lòng kiểm tra lại.');
                isValid = false;
            }
            
            // Validate confirm password
            if (!confirmPassword || password !== confirmPassword) {
                showError('confirmPassword', 'Mật khẩu xác nhận không khớp');
                isValid = false;
            }
            
            // Validate terms agreement
            if (!agreeTerms) {
                showError('agreeTerms', 'Bạn phải đồng ý với điều khoản sử dụng');
                isValid = false;
            }
            
            if (!isValid) {
                return;
            }
            
            // Simulate registration
            simulateRegistration({
                phone: userPhone,
                fullName: fullName,
                email: email,
                dob: dob,
                password: password
            });
        });
        
        function showError(field, message) {
            const errorElement = document.getElementById(field + 'Error');
            const inputElement = document.getElementById(field);
            
            if (errorElement && inputElement) {
                errorElement.textContent = message;
                errorElement.style.display = 'block';
                inputElement.classList.add('is-invalid');
            }
        }
        
        function clearErrors() {
            const errorElements = document.querySelectorAll('.field-error');
            const inputElements = document.querySelectorAll('.is-invalid');
            
            errorElements.forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });
            
            inputElements.forEach(el => {
                el.classList.remove('is-invalid');
            });
            
            // Clear alert
            document.getElementById('registerAlert').innerHTML = '';
        }
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('registerAlert');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} custom-alert" role="alert">
                    ${message}
                </div>
            `;
        }
        
        function simulateRegistration(userData) {
            showAlert('Đang xử lý đăng ký...', 'info');
            
            // Simulate API call
            setTimeout(() => {
                showAlert('Đăng ký thành công! Đang chuyển hướng đến trang đăng nhập...', 'success');
                
                // Store user info (simulated)
                console.log('Registered user:', userData);
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }, 1500);
        }
    </script>
</body>
</html>
