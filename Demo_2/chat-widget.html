<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Tư Vấn - Spa ANA</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts - Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: transparent;
        }
        
        /* Chat Widget Container */
        .chat-widget-container {
            display: none;
        }
        
        .chat-widget-container.active {
            display: block;
        }
        
        /* Chat Box */
        .chat-box {
            position: fixed;
            bottom: 100px;
            right: 2rem;
            width: 320px;
            height: 420px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(30, 58, 95, 0.25);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            animation: slideInRight 0.3s ease;
            border: 2px solid #f1f3f5;
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(50px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        /* Chat Header */
        .chat-header {
            background: linear-gradient(135deg, #1e3a5f, #2c5282);
            color: white;
            padding: 1rem 1.25rem;
            border-radius: 18px 18px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .chat-header-title h6 {
            font-weight: 600;
            font-size: 1rem;
            margin: 0;
        }
        
        .chat-header-title i {
            font-size: 1.2rem;
            color: #d4a835;
        }
        
        .chat-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        
        .status-online {
            background: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.3);
        }
        
        .status-offline {
            background: #dc3545;
            animation: none;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .chat-close-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 50%;
            transition: all 0.3s ease;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }
        
        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: #f8f9fa;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #e9ecef;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }
        
        /* Message Bubbles */
        .message-bubble {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.4;
            position: relative;
            animation: fadeInUp 0.3s ease;
        }
        
        @keyframes fadeInUp {
            from {
                transform: translateY(10px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .message-customer {
            align-self: flex-end;
            background: linear-gradient(135deg, #d4a835, #f1c40f);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-customer::after {
            content: '';
            position: absolute;
            right: -8px;
            bottom: 8px;
            width: 0;
            height: 0;
            border-left: 8px solid #f1c40f;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
        }
        
        .message-agent {
            align-self: flex-start;
            background: white;
            color: #1e3a5f;
            border: 1.5px solid #e2e8f0;
            border-bottom-left-radius: 4px;
        }
        
        .message-agent::before {
            content: '';
            position: absolute;
            left: -10px;
            bottom: 8px;
            width: 0;
            height: 0;
            border-right: 8px solid white;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
        }
        
        .message-time {
            font-size: 0.7rem;
            color: #9ca3af;
            margin-top: 0.4rem;
            display: block;
            opacity: 0.8;
        }
        
        .message-customer .message-time {
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: white;
            padding: 0.5rem 1rem;
            border-radius: 16px;
            border: 1.5px solid #e2e8f0;
            gap: 0.3rem;
        }
        
        .typing-indicator.active {
            display: flex;
            align-items: center;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6c757d;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
        }
        
        /* Chat Footer */
        .chat-footer {
            padding: 1rem;
            background: white;
            border-top: 1px solid #e9ecef;
            border-radius: 0 0 18px 18px;
        }
        
        .chat-input-container {
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }
        
        .chat-input {
            flex: 1;
            border: 2px solid #e9ecef;
            border-radius: 22px;
            padding: 0.6rem 1rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            resize: none;
            transition: all 0.3s ease;
            height: 44px;
            line-height: 1.2;
        }
        
        .chat-input:focus {
            outline: none;
            border-color: #d4a835;
            box-shadow: 0 0 0 3px rgba(212, 168, 53, 0.1);
        }
        
        .chat-input::placeholder {
            color: #adb5bd;
        }
        
        .chat-send-btn {
            background: linear-gradient(135deg, #d4a835, #f1c40f);
            border: none;
            color: white;
            font-weight: 600;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
        
        .chat-send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(212, 168, 53, 0.3);
        }
        
        .chat-send-btn:active {
            transform: scale(0.95);
        }
        
        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Offline Message */
        .offline-message {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 12px;
            padding: 0.75rem;
            font-size: 0.85rem;
            color: #856404;
            text-align: center;
            margin: 1rem;
        }
        
        .offline-message i {
            margin-right: 0.5rem;
        }
        
        /* Error Message */
        .error-message {
            background: #f8d7da;
            border: 1px solid #dc3545;
            border-radius: 12px;
            padding: 0.75rem;
            font-size: 0.85rem;
            color: #721c24;
            text-align: center;
            margin: 1rem;
        }
        
        .error-message i {
            margin-right: 0.5rem;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .chat-box {
                bottom: 0;
                right: 0;
                left: 0;
                width: 100%;
                height: 80vh;
                max-height: 600px;
                border-radius: 20px 20px 0 0;
                animation: slideUp 0.3s ease;
            }
            
            @keyframes slideUp {
                from {
                    transform: translateY(100%);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
            
            .chat-header {
                border-radius: 20px 20px 0 0;
            }
        }
    </style>
</head>
<body>
    
    <!-- Chat Widget Container -->
    <div class="chat-widget-container" id="chatWidget">
        <div class="chat-box">
            
            <!-- Header -->
            <div class="chat-header">
                <div class="chat-header-title">
                    <i class="fas fa-spa"></i>
                    <h6>Chat tư vấn Spa ANA</h6>
                </div>
                <div class="chat-status">
                    <span class="status-dot status-online" id="statusDot"></span>
                    <span id="statusText">Đang online</span>
                </div>
                <button class="chat-close-btn" onclick="toggleChat()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <!-- Messages -->
            <div class="chat-messages" id="chatMessages">
                <!-- Offline Message (hidden by default) -->
                <div class="offline-message" id="offlineMessage" style="display: none;">
                    <i class="fas fa-info-circle"></i>
                    <span>Chúng tôi đã nhận được thông tin từ bạn. Chúng tôi sẽ phản hồi khi có nhân viên trực tuyến.</span>
                </div>
                
                <!-- Typing Indicator (hidden by default) -->
                <div class="typing-indicator" id="typingIndicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="chat-footer">
                <div class="chat-input-container">
                    <input 
                        type="text" 
                        class="chat-input" 
                        id="chatInput"
                        placeholder="Nhập tin nhắn..."
                        onkeypress="handleKeyPress(event)"
                    >
                    <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
            
        </div>
    </div>
    
    <script>
        // Chat State
        let chatOpen = false;
        let isAgentOnline = true;
        let chatSessionId = null;
        let currentUser = null;
        let messages = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            initializeChat();
        });
        
        function initializeChat() {
            // Check if user is logged in
            currentUser = checkUserLoggedIn();
            
            // Generate or load session ID
            chatSessionId = generateSessionId();
            
            // Check agent status
            checkAgentStatus();
            
            // Load chat history if user is logged in
            if (currentUser) {
                loadChatHistory();
            }
            
            // Focus input when chat opens
            document.getElementById('chatInput').addEventListener('focus', function() {
                if (chatOpen) {
                    scrollToBottom();
                }
            });
        }
        
        function checkUserLoggedIn() {
            const user = localStorage.getItem('currentUser');
            return user ? JSON.parse(user) : null;
        }
        
        function generateSessionId() {
            let sessionId = sessionStorage.getItem('chatSessionId');
            if (!sessionId) {
                sessionId = 'CHAT-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                sessionStorage.setItem('chatSessionId', sessionId);
            }
            return sessionId;
        }
        
        function checkAgentStatus() {
            // Simulate checking agent status
            // In real app, this would be an API call
            setTimeout(() => {
                // Randomly set online/offline for demo
                isAgentOnline = Math.random() > 0.3; // 70% chance online
                updateStatusUI();
            }, 1000);
        }
        
        function updateStatusUI() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const offlineMessage = document.getElementById('offlineMessage');
            
            if (isAgentOnline) {
                statusDot.classList.remove('status-offline');
                statusDot.classList.add('status-online');
                statusText.textContent = 'Đang online';
                offlineMessage.style.display = 'none';
            } else {
                statusDot.classList.remove('status-online');
                statusDot.classList.add('status-offline');
                statusText.textContent = 'Ngoại tuyến';
                offlineMessage.style.display = 'block';
            }
        }
        
        function toggleChat() {
            const widget = document.getElementById('chatWidget');
            chatOpen = !chatOpen;
            
            if (chatOpen) {
                widget.classList.add('active');
                document.getElementById('chatInput').focus();
            } else {
                widget.classList.remove('active');
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            // Validate message
            if (!message) {
                showError('Vui lòng nhập nội dung tin nhắn');
                return;
            }
            
            // Check if text only (no HTML)
            if (/<[^>]*>/.test(message)) {
                showError('Nội dung không hợp lệ. Chỉ chấp nhận văn bản.');
                return;
            }
            
            // Create message object
            const messageObj = {
                id: Date.now(),
                sessionId: chatSessionId,
                type: 'customer',
                content: message,
                timestamp: new Date().toISOString(),
                userId: currentUser ? currentUser.phone : 'guest'
            };
            
            // Display message immediately
            displayMessage(messageObj);
            
            // Clear input
            input.value = '';
            
            // Save to history
            messages.push(messageObj);
            if (currentUser) {
                saveToHistory(messageObj);
            }
            
            // Send to server
            sendToServer(messageObj);
        }
        
        function displayMessage(messageObj) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            
            if (messageObj.type === 'customer') {
                messageDiv.className = 'message-bubble message-customer';
            } else {
                messageDiv.className = 'message-bubble message-agent';
            }
            
            messageDiv.innerHTML = `
                ${escapeHtml(messageObj.content)}
                <span class="message-time">${formatTime(messageObj.timestamp)}</span>
            `;
            
            // Insert before typing indicator
            const typingIndicator = document.getElementById('typingIndicator');
            messagesContainer.insertBefore(messageDiv, typingIndicator);
            
            scrollToBottom();
        }
        
        function sendToServer(messageObj) {
            // Simulate sending to server
            // In real app, this would be an API call to chat server
            
            showTyping(true);
            
            // Simulate server response delay
            setTimeout(() => {
                // Check if agent is online
                if (isAgentOnline) {
                    // Simulate agent response
                    const responseObj = {
                        id: Date.now() + 1,
                        sessionId: chatSessionId,
                        type: 'agent',
                        content: generateAgentResponse(messageObj.content),
                        timestamp: new Date().toISOString()
                    };
                    
                    displayMessage(responseObj);
                    messages.push(responseObj);
                    
                    if (currentUser) {
                        saveToHistory(responseObj);
                    }
                } else {
                    // Agent offline - message queued
                    console.log('Message queued:', messageObj);
                }
                
                showTyping(false);
                scrollToBottom();
                
            }, 1500 + Math.random() * 1000); // Random delay 1.5-2.5s
        }
        
        function generateAgentResponse(customerMessage) {
            const responses = [
                'Xin chào! Rất vui được hỗ trợ bạn. Bạn đang cần tư vấn về dịch vụ nào?',
                'Cảm ơn bạn đã liên hệ. Spa ANA xin được thông tin chi tiết để hỗ trợ tốt hơn.',
                'Hiện tại chúng tôi có các gói chăm sóc da, massage, và phun thêu. Bạn quan tâm đến dịch vụ nào?',
                'Bạn có muốn đặt lịch hẹn không? Chúng tôi có sẵn các slot trong tuần này.',
                'Rất tiếc để bạn phải chờ. Chúng tôi sẽ cố gắng phản hồi sớm nhất có thể.'
            ];
            
            return responses[Math.floor(Math.random() * responses.length)];
        }
        
        function showTyping(show) {
            const indicator = document.getElementById('typingIndicator');
            if (show) {
                indicator.classList.add('active');
            } else {
                indicator.classList.remove('active');
            }
        }
        
        function showError(message) {
            const messagesContainer = document.getElementById('chatMessages');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i><span>${message}</span>`;
            
            const typingIndicator = document.getElementById('typingIndicator');
            messagesContainer.insertBefore(errorDiv, typingIndicator);
            
            scrollToBottom();
            
            // Auto remove after 3 seconds
            setTimeout(() => {
                errorDiv.remove();
            }, 3000);
        }
        
        function scrollToBottom() {
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function formatTime(isoString) {
            const date = new Date(isoString);
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function saveToHistory(messageObj) {
            try {
                // In real app, this would save to backend
                // For now, save to localStorage
                let history = JSON.parse(localStorage.getItem('chatHistory') || '{}');
                if (!history[chatSessionId]) {
                    history[chatSessionId] = [];
                }
                history[chatSessionId].push(messageObj);
                localStorage.setItem('chatHistory', JSON.stringify(history));
            } catch (e) {
                console.error('Error saving chat history:', e);
            }
        }
        
        function loadChatHistory() {
            try {
                const history = JSON.parse(localStorage.getItem('chatHistory') || '{}');
                if (history[chatSessionId]) {
                    history[chatSessionId].forEach(msg => {
                        displayMessage(msg);
                    });
                    messages = history[chatSessionId];
                    scrollToBottom();
                }
            } catch (e) {
                console.error('Error loading chat history:', e);
            }
        }
        
        // Public API for external integration
        window.ChatWidget = {
            toggle: toggleChat,
            isOpen: () => chatOpen,
            sendMessage: sendMessage,
            setAgentOnline: (online) => {
                isAgentOnline = online;
                updateStatusUI();
            }
        };
    </script>
</body>
</html>
