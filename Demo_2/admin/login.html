<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin - Spa ANA</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts - Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    
    <style>
        .admin-login-container {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(30, 58, 95, 0.9), rgba(44, 82, 130, 0.9)),
                        url('https://images.unsplash.com/photo-1540555700478-4be289be4bf?w=1920') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        .admin-login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(30, 58, 95, 0.7);
            backdrop-filter: blur(10px);
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: slideInUp 0.6s ease;
            position: relative;
            z-index: 10;
        }
        
        @keyframes slideInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .login-header i {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #d4a853, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            padding: 1.5rem;
            border-radius: 50%;
            color: white;
            box-shadow: 0 10px 30px rgba(212, 168, 53, 0.3);
        }
        
        .login-header h3 {
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
            font-size: 1.8rem;
        }
        
        .login-header p {
            color: #6c757d;
            margin: 0;
            font-size: 0.95rem;
        }
        
        .form-label {
            font-weight: 600;
            color: #1e3a5f;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            display: block;
        }
        
        .form-label i {
            color: #d4a853;
            margin-right: 0.5rem;
            font-size: 1.1rem;
        }
        
        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
            height: 52px;
        }
        
        .form-control:focus {
            border-color: #d4a853;
            box-shadow: 0 0 0 4px rgba(212, 168, 53, 0.2);
            background: white;
            outline: none;
        }
        
        .form-control::placeholder {
            color: #adb5bd;
            font-weight: 400;
        }
        
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .input-group-text {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
            pointer-events: none;
            font-size: 1.2rem;
            z-index: 5;
        }
        
        .input-group .form-control {
            padding-left: 3.5rem;
        }
        
        .input-group:focus-within {
            border-color: #d4a853;
            box-shadow: 0 0 0 4px rgba(212, 168, 53, 0.2);
        }
        
        .input-group:focus-within .input-group-text {
            color: #d4a853;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #d4a853, #f1c40f);
            border: none;
            padding: 1rem 2rem;
            font-weight: 600;
            border-radius: 12px;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s ease;
            color: white;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(212, 168, 53, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 168, 53, 0.4);
            background: linear-gradient(135deg, #c4a351, #f39c12);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login i {
            font-size: 1.2rem;
            margin-right: 0.5rem;
        }
        
        .back-link {
            text-align: center;
            margin-top: 2rem;
        }
        
        .back-link a {
            color: #6c757d;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
        }
        
        .back-link a:hover {
            color: #d4a853;
            background: #f8f9fa;
        }
        
        .back-link a i {
            color: #6c757d;
            font-size: 1.1rem;
        }
        
        .demo-credentials {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-top: 1.5rem;
            text-align: center;
        }
        
        .demo-credentials p {
            margin: 0.5rem 0;
            font-size: 0.9rem;
            color: #495057;
        }
        
        .demo-credentials strong {
            color: #1e3a5f;
            font-weight: 600;
        }
        
        .alert-login {
            background: #fee2e2;
            border-left: 4px solid #dc3545;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            display: none;
            animation: shake 0.5s ease;
        }
        
        .alert-login.show {
            display: block;
        }
        
        .alert-login .alert-icon {
            font-size: 1.5rem;
            margin-right: 0.75rem;
            color: #dc3545;
        }
        
        .alert-login .alert-message {
            font-weight: 500;
            color: #7f1d39;
            font-size: 0.95rem;
        }
        
        @keyframes shake {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(-5px);
            }
            75% {
                transform: translateX(5px);
            }
        }
        
        /* Loading State */
        .btn-login.loading {
            opacity: 0.7;
            pointer-events: none;
            cursor: not-allowed;
        }
        
        .btn-login.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid white;
            border-radius: 50%;
            border-top: 2px solid transparent;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .admin-login-container {
                padding: 1rem;
            }
            
            .login-card {
                padding: 2rem;
                border-radius: 16px;
            }
            
            .login-header i {
                font-size: 2.5rem;
                padding: 1rem;
            }
            
            .login-header h3 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="login-card">
            
            <div class="login-header">
                <i class="fas fa-user-shield"></i>
                <h3>Đăng nhập Admin</h3>
                <p>Hệ thống quản lý Spa ANA</p>
            </div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                
                <div class="mb-4">
                    <label for="username" class="form-label">
                        <i class="fas fa-user"></i>
                        Tên đăng nhập
                    </label>
                    <div class="input-group">
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            placeholder="Nhập tên đăng nhập"
                            required
                            autocomplete="off"
                        >
                        <span class="input-group-text">
                            <i class="fas fa-user"></i>
                        </span>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i>
                        Mật khẩu
                    </label>
                    <div class="input-group">
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            placeholder="Nhập mật khẩu"
                            required
                            autocomplete="off"
                        >
                        <span class="input-group-text">
                            <i class="fas fa-lock"></i>
                        </span>
                    </div>
                </div>
                
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Ghi nhớ đăng nhập
                        </label>
                    </div>
                </div>
                
                <div id="loginError" class="alert-login">
                    <i class="fas fa-exclamation-triangle alert-icon"></i>
                    <span class="alert-message" id="errorMessage"></span>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    Đăng nhập
                </button>
                
            </form>
            
            <div class="back-link">
                <a href="../index.html">
                    <i class="fas fa-arrow-left"></i>
                    Quay lại trang chủ
                </a>
            </div>
            
            <!-- <div class="demo-credentials">
                <p class="text-muted mb-2">Tài khoản demo:</p>
                <p class="mb-1"><strong>Tên đăng nhập:</strong> admin</p>
                <p><strong>Mật khẩu:</strong> admin123</p>
            </div> -->
            
        </div>
    </div>
    
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script>
        // Admin Authentication
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');
            const errorMessage = document.getElementById('errorMessage');
            
            // Hide previous error
            errorDiv.classList.remove('show');
            
            // Validate inputs
            if (!username || !password) {
                showLoginError('Vui lòng nhập đầy đủ thông tin!');
                return;
            }
            
            if (username.length < 3) {
                showLoginError('Tên đăng nhập phải có ít nhất 3 ký tự!');
                return;
            }
            
            if (password.length < 6) {
                showLoginError('Mật khẩu phải có ít nhất 6 ký tự!');
                return;
            }
            
            // Show loading state
            loginBtn.classList.add('loading');
            loginBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Đang đăng nhập...';
            
            // Simulate API call
            setTimeout(function() {
                // Demo authentication
                if (username === 'admin' && password === 'admin123') {
                    // Login successful
                    const adminUser = {
                        username: username,
                        role: 'admin',
                        name: 'Administrator',
                        loginTime: new Date().toISOString()
                    };
                    
                    // Save to localStorage
                    localStorage.setItem('adminUser', JSON.stringify(adminUser));
                    
                    if (rememberMe) {
                        localStorage.setItem('rememberAdmin', 'true');
                    } else {
                        localStorage.setItem('rememberAdmin', 'false');
                    }
                    
                    // Hide loading state
                    loginBtn.classList.remove('loading');
                    loginBtn.innerHTML = '<i class="fas fa-check"></i> Đăng nhập thành công';
                    loginBtn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
                    
                    // Show success message
                    showLoginSuccess();
                    
                    // Redirect to dashboard after delay
                    setTimeout(function() {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                    
                } else {
                    // Login failed
                    loginBtn.classList.remove('loading');
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Đăng nhập';
                    
                    showLoginError('Tên đăng nhập hoặc mật khẩu không chính xác!');
                }
            }, 1500); // Simulate 1.5s delay
        }
        
        // Show Login Error
        function showLoginError(message) {
            const errorDiv = document.getElementById('loginError');
            const errorMessage = document.getElementById('errorMessage');
            
            errorMessage.textContent = message;
            errorDiv.classList.add('show');
            
            // Auto hide after 5 seconds
            setTimeout(function() {
                hideLoginError();
            }, 5000);
        }
        
        // Hide Login Error
        function hideLoginError() {
            const errorDiv = document.getElementById('loginError');
            errorDiv.classList.remove('show');
        }
        
        // Show Login Success
        function showLoginSuccess() {
            const errorDiv = document.getElementById('loginError');
            errorDiv.classList.remove('show');
            
            // You can also show a success toast here
        }
        
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
        });
        
        // Check Login Status
        function checkLoginStatus() {
            const adminUser = localStorage.getItem('adminUser');
            
            if (adminUser) {
                try {
                    const user = JSON.parse(adminUser);
                    const loginTime = new Date(user.loginTime);
                    const now = new Date();
                    
                    // Check if login is within 24 hours
                    const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
                    
                    if (hoursDiff < 24) {
                        // Redirect to dashboard
                        window.location.href = 'dashboard.html';
                    }
                } catch (e) {
                    console.error('Error parsing admin user:', e);
                }
            }
        }
        
        // Handle Enter key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && event.target.tagName !== 'BUTTON') {
                event.preventDefault();
                handleLogin(event);
            }
        });
        
        // Focus first input on load
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('username').focus();
            }, 100);
        };
    </script>
</body>
</html>
