<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập Admin - Spa ANA</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FontAwesome -->
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      rel="stylesheet"
    />

    <!-- Google Fonts - Montserrat -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css" />

    <style>
      .admin-login-container {
        min-height: 100vh;
        background:
          linear-gradient(
            135deg,
            rgba(30, 58, 95, 0.9),
            rgba(44, 82, 130, 0.9)
          ),
          url("https://images.unsplash.com/photo-1540555700478-4be289fbecef?w=1920")
            center/cover;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .login-card {
        background: white;
        border-radius: 20px;
        padding: 3rem;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: slideInUp 0.5s ease;
      }

      @keyframes slideInUp {
        from {
          transform: translateY(30px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .login-header i {
        font-size: 3rem;
        background: linear-gradient(135deg, #d4a835, #f1c40f);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 1rem;
      }

      .login-header h3 {
        font-weight: 700;
        color: #1e3a5f;
        margin-bottom: 0.5rem;
      }

      .login-header p {
        color: #6c757d;
        margin: 0;
      }

      .form-label {
        font-weight: 600;
        color: #1e3a5f;
        margin-bottom: 0.5rem;
      }

      .form-control {
        border: 2px solid #e9ecef;
        border-radius: 12px;
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
        transition: all 0.3s ease;
      }

      .form-control:focus {
        border-color: #d4a835;
        box-shadow: 0 0 0 3px rgba(212, 168, 53, 0.1);
      }

      .btn-login {
        background: linear-gradient(135deg, #d4a835, #f1c40f);
        border: none;
        padding: 0.875rem;
        font-weight: 600;
        border-radius: 12px;
        width: 100%;
        transition: all 0.3s ease;
        font-size: 1rem;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(212, 168, 53, 0.3);
        background: linear-gradient(135deg, #e5a343, #f39c12);
      }

      .btn-login i {
        margin-right: 0.5rem;
      }

      .back-link {
        text-align: center;
        margin-top: 1.5rem;
      }

      .back-link a {
        color: #6c757d;
        text-decoration: none;
        transition: all 0.3s ease;
      }

      .back-link a:hover {
        color: #d4a835;
        text-decoration: underline;
      }

      .input-group-text {
        background: transparent;
        border: 2px solid #e9ecef;
        border-right: none;
      }

      .input-group .form-control {
        border-left: none;
      }

      .input-group:focus-within {
        border-color: #d4a835;
      }

      .input-group:focus-within .input-group-text {
        border-color: #d4a835;
        box-shadow: 0 0 0 3px rgba(212, 168, 53, 0.1);
      }

      .input-group:focus-within .form-control {
        border-color: #d4a835;
        box-shadow: 0 0 0 3px rgba(212, 168, 53, 0.1);
      }
    </style>
  </head>
  <body>
    <div class="admin-login-container">
      <div class="login-card">
        <div class="login-header">
          <i class="fas fa-user-shield"></i>
          <h3>Đăng nhập Admin</h3>
          <p>Hệ thống quản lý Spa ANA</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="mb-3">
            <label for="username" class="form-label">
              <i class="fas fa-user me-2"></i>Tên đăng nhập
            </label>
            <input
              type="text"
              class="form-control"
              id="username"
              placeholder="Nhập tên đăng nhập"
              required
            />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">
              <i class="fas fa-lock me-2"></i>Mật khẩu
            </label>
            <div class="input-group">
              <span class="input-group-text">
                <i class="fas fa-lock text-muted"></i>
              </span>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Nhập mật khẩu"
                required
              />
            </div>
          </div>

          <div class="mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" />
              <label class="form-check-label" for="rememberMe">
                Ghi nhớ đăng nhập
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-login">
            <i class="fas fa-sign-in-alt"></i>
            Đăng nhập
          </button>

          <div
            id="loginError"
            class="alert alert-danger mt-3"
            style="display: none"
          >
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span id="errorMessage"></span>
          </div>
        </form>

        <div class="back-link">
          <a href="../index.html">
            <i class="fas fa-arrow-left me-2"></i>Quay lại trang chủ
          </a>
        </div>

        <div class="text-center mt-4 text-muted small">
          <p class="mb-1">Tài khoản demo:</p>
          <p class="mb-0">
            <strong>Username:</strong> admin |
            <strong>Password:</strong> admin123
          </p>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      function handleLogin(event) {
        event.preventDefault();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const rememberMe = document.getElementById("rememberMe").checked;
        const errorDiv = document.getElementById("loginError");
        const errorMessage = document.getElementById("errorMessage");

        // Hide previous error
        errorDiv.style.display = "none";

        // Validate inputs
        if (!username || !password) {
          showLoginError("Vui lòng nhập đầy đủ thông tin");
          return;
        }

        // Demo authentication
        if (username === "admin" && password === "admin123") {
          // Login successful
          const adminUser = {
            username: "admin",
            role: "admin",
            name: "Administrator",
            loginTime: new Date().toISOString(),
          };

          // Save to localStorage
          localStorage.setItem("adminUser", JSON.stringify(adminUser));

          if (rememberMe) {
            localStorage.setItem("rememberAdmin", "true");
          }

          // Show success message
          alert("Đăng nhập thành công!");

          // Redirect to dashboard
          window.location.href = "dashboard.html";
        } else {
          // Login failed
          showLoginError("Tên đăng nhập hoặc mật khẩu không chính xác");
        }
      }

      function showLoginError(message) {
        const errorDiv = document.getElementById("loginError");
        const errorMessage = document.getElementById("errorMessage");

        errorMessage.textContent = message;
        errorDiv.style.display = "block";

        // Auto hide after 5 seconds
        setTimeout(() => {
          errorDiv.style.display = "none";
        }, 5000);
      }

      // Check if already logged in
      document.addEventListener("DOMContentLoaded", function () {
        const adminUser = localStorage.getItem("adminUser");
        if (adminUser) {
          // Redirect to dashboard
          window.location.href = "dashboard.html";
        }
      });
    </script>
  </body>
</html>
