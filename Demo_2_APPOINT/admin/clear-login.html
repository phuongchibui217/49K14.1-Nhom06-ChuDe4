<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xóa đăng nhập Admin - Spa ANA</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    
    <!-- Google Fonts - Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1e3a5f, #2c5282);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .clear-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }
        
        .clear-icon {
            font-size: 4rem;
            color: #d4a853;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .btn-clear {
            background: linear-gradient(135deg, #dc3545, #c82333);
            border: none;
            padding: 1rem 2rem;
            font-weight: 600;
            border-radius: 12px;
            width: 100%;
            color: white;
            transition: all 0.3s ease;
        }
        
        .btn-clear:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }
        
        .btn-back {
            background: linear-gradient(135deg, #d4a853, #f1c40f);
            border: none;
            padding: 1rem 2rem;
            font-weight: 600;
            border-radius: 12px;
            width: 100%;
            color: white;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 168, 53, 0.4);
        }
    </style>
</head>
<body>
    <div class="clear-card">
        <div class="clear-icon">
            <i class="fas fa-sign-out-alt"></i>
        </div>
        
        <h3 class="text-center mb-4">Xóa đăng nhập Admin</h3>
        
        <p class="text-muted text-center mb-4">
            Trang này sẽ xóa thông tin đăng nhập đã lưu và chuyển bạn về trang đăng nhập.
        </p>
        
        <button class="btn btn-clear" onclick="clearLogin()">
            <i class="fas fa-trash-alt me-2"></i>
            Xóa đăng nhập
        </button>
        
        <button class="btn btn-back" onclick="goToLogin()">
            <i class="fas fa-sign-in-alt me-2"></i>
            Đi đến trang đăng nhập
        </button>
        
        <div id="message" class="alert mt-3 d-none"></div>
    </div>
    
    <script>
        function clearLogin() {
            // Clear admin user data
            localStorage.removeItem('adminUser');
            localStorage.removeItem('rememberAdmin');
            
            // Show success message
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'alert alert-success mt-3';
            messageDiv.innerHTML = '<i class="fas fa-check-circle me-2"></i>Đã xóa thông tin đăng nhập!';
            messageDiv.classList.remove('d-none');
            
            // Redirect to login after 1.5 seconds
            setTimeout(function() {
                window.location.href = 'login.html';
            }, 1500);
        }
        
        function goToLogin() {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
