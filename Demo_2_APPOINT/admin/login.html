<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Đăng nhập Admin | Spa ANA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Font Awesome -->
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --primary-blue: #1f3b5c;
      --gold: #e1b84f;
      --gold-dark: #c9a63a;
      --text-dark: #1a1a1a;
      --bg-blue: linear-gradient(135deg, #1f3b5c, #2e557f);
    }

    * {
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-blue);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 420px;
      background: #fff;
      border-radius: 20px;
      padding: 40px 35px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 15px;
      background: radial-gradient(#fff, #fff8e1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(225, 184, 79, 0.35);
    }

    .login-icon i {
      font-size: 40px;
      color: var(--gold);
    }

    .login-header h2 {
      margin: 0;
      color: var(--primary-blue);
      font-weight: 700;
    }

    .login-header p {
      margin-top: 6px;
      color: #6b7280;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: var(--primary-blue);
      font-weight: 600;
      font-size: 14px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 15px;
    }

    .input-wrapper input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border-radius: 10px;
      border: 1.8px solid #e5e7eb;
      outline: none;
      transition: 0.3s;
      font-size: 14px;
    }

    .input-wrapper input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(225, 184, 79, 0.25);
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 22px;
      color: #4b5563;
    }

    .options a {
      text-decoration: none;
      color: var(--primary-blue);
      font-weight: 600;
    }

    .options a:hover {
      text-decoration: underline;
    }

    .login-btn {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: 0.3s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(225, 184, 79, 0.45);
    }

    .back-home {
      text-align: center;
      margin-top: 22px;
    }

    .back-home a {
      text-decoration: none;
      color: #6b7280;
      font-size: 14px;
    }

    .back-home a:hover {
      color: var(--primary-blue);
    }

    /* Alert Messages */
    .alert-message {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 18px;
      font-size: 14px;
      display: none;
      animation: slideDown 0.3s ease;
    }

    .alert-message.show {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .alert-error {
      background: #fee2e2;
      border-left: 4px solid #dc3545;
      color: #991b1b;
    }

    .alert-success {
      background: #dcfce7;
      border-left: 4px solid #22c55e;
      color: #166534;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 35px;
      border-radius: 20px;
      width: 90%;
      max-width: 420px;
      animation: slideUp 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      text-align: center;
      margin-bottom: 25px;
    }

    .modal-header h3 {
      margin: 0 0 8px;
      color: var(--primary-blue);
      font-size: 22px;
      font-weight: 700;
    }

    .modal-header p {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
    }

    .close-modal {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 24px;
      color: #6b7280;
      cursor: pointer;
      transition: 0.3s;
    }

    .close-modal:hover {
      color: var(--primary-blue);
    }

    .btn-submit {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      margin-top: 8px;
      transition: 0.3s;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(225, 184, 79, 0.45);
    }

    .btn-secondary {
      background: #6b7280;
      margin-top: 10px;
    }

    .btn-secondary:hover {
      background: #4b5563;
      box-shadow: 0 10px 25px rgba(107, 114, 128, 0.45);
    }

    /* Loading Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #ffffff;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .btn-submit.loading .spinner {
      display: inline-block;
    }

    .btn-submit.loading .btn-text {
      display: none;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-icon">
        <i class="fa-solid fa-user-shield"></i>
      </div>
      <h2>Đăng nhập Admin</h2>
      <p>Hệ thống quản lý Spa ANA</p>
    </div>

    <!-- Error/Success Messages -->
    <div id="loginAlert" class="alert-message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Tên đăng nhập</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-user"></i>
          <input
            type="text"
            id="username"
            placeholder="Nhập tên đăng nhập"
            required
            autocomplete="off"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Mật khẩu</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input
            type="password"
            id="password"
            placeholder="Nhập mật khẩu"
            required
            autocomplete="off"
          />
        </div>
      </div>

      <div class="options">
        <label>
          <input type="checkbox" id="rememberMe" /> Ghi nhớ đăng nhập
        </label>
        <a href="#" id="forgotPasswordLink">Quên mật khẩu?</a>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span class="btn-text">Đăng nhập</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="back-home">
      <a href="../index.html">
        <i class="fa-solid fa-arrow-left"></i>
        Quay lại trang chủ
      </a>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal-overlay" id="forgotPasswordModal">
    <div class="modal-content" style="position: relative;">
      <button class="close-modal" id="closeModal">&times;</button>

      <div class="modal-header">
        <h3>Quên mật khẩu?</h3>
        <p>Nhập email để nhận link đặt lại mật khẩu</p>
      </div>

      <!-- Alert Message -->
      <div id="modalAlert" class="alert-message"></div>

      <form id="forgotPasswordForm">
        <div class="form-group">
          <label>Email đăng ký</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope"></i>
            <input
              type="email"
              id="resetEmail"
              placeholder="Nhập email của bạn"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn-submit" id="submitReset">
          <span class="btn-text">Gửi link đặt lại</span>
          <div class="spinner"></div>
        </button>

        <button type="button" class="btn-submit btn-secondary" id="cancelReset">
          Hủy bỏ
        </button>
      </form>
    </div>
  </div>

  <script>
    // DOM Elements
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const loginAlert = document.getElementById('loginAlert');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const rememberMeCheckbox = document.getElementById('rememberMe');
    const forgotPasswordLink = document.getElementById('forgotPasswordLink');
    const forgotPasswordModal = document.getElementById('forgotPasswordModal');
    const closeModalBtn = document.getElementById('closeModal');
    const cancelResetBtn = document.getElementById('cancelReset');
    const forgotPasswordForm = document.getElementById('forgotPasswordForm');
    const submitResetBtn = document.getElementById('submitReset');
    const resetEmailInput = document.getElementById('resetEmail');
    const modalAlert = document.getElementById('modalAlert');

    // Demo Credentials
    const DEMO_CREDENTIALS = {
      username: 'admin',
      password: 'admin123'
    };

    // Admin users database (demo)
    const ADMIN_USERS = [
      { username: 'admin', password: 'admin123', email: 'admin@spaana.com', name: 'Administrator' }
    ];

    // Check if already logged in
    function checkLoginStatus() {
      const adminUser = localStorage.getItem('adminUser');
      if (adminUser) {
        try {
          const user = JSON.parse(adminUser);
          const loginTime = new Date(user.loginTime);
          const now = new Date();
          const hoursDiff = (now - loginTime) / (1000 * 60 * 60);

          // Check if login is within 24 hours
          if (hoursDiff < 24) {
            window.location.href = 'dashboard.html';
            return true;
          }
        } catch (e) {
          console.error('Error parsing admin user:', e);
        }
      }
      return false;
    }

    // Show Alert Message
    function showAlert(element, message, type = 'error') {
      element.className = `alert-message alert-${type} show`;
      element.innerHTML = `
        <i class="fa-solid ${type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'}"></i>
        <span>${message}</span>
      `;

      // Auto hide after 5 seconds
      setTimeout(() => {
        element.classList.remove('show');
      }, 5000);
    }

    // Hide Alert Message
    function hideAlert(element) {
      element.classList.remove('show');
    }

    // Handle Login Form Submit
    loginForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      const rememberMe = rememberMeCheckbox.checked;

      // Hide previous error
      hideAlert(loginAlert);

      // Validate inputs
      if (!username || !password) {
        showAlert(loginAlert, 'Vui lòng nhập đầy đủ thông tin!', 'error');
        return;
      }

      if (username.length < 3) {
        showAlert(loginAlert, 'Tên đăng nhập phải có ít nhất 3 ký tự!', 'error');
        return;
      }

      if (password.length < 6) {
        showAlert(loginAlert, 'Mật khẩu phải có ít nhất 6 ký tự!', 'error');
        return;
      }

      // Show loading state
      loginBtn.classList.add('loading');
      loginBtn.disabled = true;

      // Simulate API call
      setTimeout(function() {
        // Check credentials
        const user = ADMIN_USERS.find(
          u => u.username === username && u.password === password
        );

        if (user) {
          // Login successful
          const adminUser = {
            username: user.username,
            role: 'admin',
            name: user.name,
            email: user.email,
            loginTime: new Date().toISOString()
          };

          // Save to localStorage
          localStorage.setItem('adminUser', JSON.stringify(adminUser));

          if (rememberMe) {
            localStorage.setItem('rememberAdmin', 'true');
          } else {
            localStorage.setItem('rememberAdmin', 'false');
          }

          // Show success message
          showAlert(loginAlert, 'Đăng nhập thành công! Đang chuyển hướng...', 'success');
          loginBtn.classList.remove('loading');
          loginBtn.innerHTML = '<i class="fa-solid fa-check"></i> Thành công';

          // Redirect to dashboard after delay
          setTimeout(function() {
            window.location.href = 'dashboard.html';
          }, 1000);

        } else {
          // Login failed
          loginBtn.classList.remove('loading');
          loginBtn.disabled = false;
          showAlert(loginAlert, 'Tên đăng nhập hoặc mật khẩu không chính xác!', 'error');
        }
      }, 1500);
    });

    // Open Forgot Password Modal
    forgotPasswordLink.addEventListener('click', function(e) {
      e.preventDefault();
      forgotPasswordModal.classList.add('show');
      resetEmailInput.focus();
    });

    // Close Modal Functions
    function closeModal() {
      forgotPasswordModal.classList.remove('show');
      hideAlert(modalAlert);
      forgotPasswordForm.reset();
      submitResetBtn.classList.remove('loading');
      submitResetBtn.disabled = false;
    }

    closeModalBtn.addEventListener('click', closeModal);
    cancelResetBtn.addEventListener('click', closeModal);

    // Close modal when clicking outside
    forgotPasswordModal.addEventListener('click', function(e) {
      if (e.target === forgotPasswordModal) {
        closeModal();
      }
    });

    // Handle Forgot Password Form Submit
    forgotPasswordForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const email = resetEmailInput.value.trim();

      // Hide previous alert
      hideAlert(modalAlert);

      // Validate email
      if (!email) {
        showAlert(modalAlert, 'Vui lòng nhập email!', 'error');
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showAlert(modalAlert, 'Email không hợp lệ!', 'error');
        return;
      }

      // Show loading state
      submitResetBtn.classList.add('loading');
      submitResetBtn.disabled = true;

      // Simulate API call
      setTimeout(function() {
        // Check if email exists in database
        const user = ADMIN_USERS.find(u => u.email === email);

        if (user) {
          // Email exists - send reset link
          showAlert(
            modalAlert,
            `Link đặt lại mật khẩu đã được gửi đến ${email}. Vui lòng kiểm tra email!`,
            'success'
          );

          // In real application, send email with reset link
          console.log(`Reset link sent to: ${email}`);
          console.log(`Reset token: ${generateResetToken(user.username)}`);

          // Close modal after 3 seconds
          setTimeout(() => {
            closeModal();
          }, 3000);

        } else {
          // Email doesn't exist - but don't reveal this for security
          showAlert(
            modalAlert,
            `Nếu email tồn tại, link đặt lại mật khẩu sẽ được gửi đến ${email}.`,
            'success'
          );

          // Close modal after 3 seconds
          setTimeout(() => {
            closeModal();
          }, 3000);
        }

        submitResetBtn.classList.remove('loading');
        submitResetBtn.disabled = false;
      }, 1500);
    });

    // Generate Reset Token (demo function)
    function generateResetToken(username) {
      return btoa(`${username}-${Date.now()}`);
    }

    // Check login status on page load
    document.addEventListener('DOMContentLoaded', function() {
      checkLoginStatus();
      usernameInput.focus();
    });

    // Handle Escape key to close modal
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && forgotPasswordModal.classList.contains('show')) {
        closeModal();
      }
    });
  </script>
</body>
</html>
