{% extends 'spa/base.html' %}

{% block title %}Đặt lại mật khẩu thành công | Spa ANA{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow border-0" style="border-radius:12px;">
                    <div class="card-body p-5 text-center">
                        <i class="fas fa-check-circle fa-3x mb-3" style="color:#22c55e;"></i>
                        <h3 class="fw-bold mb-2">Đặt lại mật khẩu thành công</h3>
                        <p class="text-muted mb-4">Mật khẩu của bạn đã được cập nhật. Bạn có thể đăng nhập bằng mật khẩu mới.</p>
                        <a href="{% url 'accounts:login' %}" class="btn btn-warning px-4">
                            <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập ngay
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
