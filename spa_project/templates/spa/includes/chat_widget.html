{% load static %}

<link rel="stylesheet" href="{% static 'css/chat-widget.css' %}">

<div class="chat-widget-container" id="chatWidgetContainer">
    <div class="chat-box">
        <div class="chat-header">
            <div class="chat-header-title">
                <i class="fas fa-spa"></i>
                <div>
                    <h6>Spa ANA</h6>
                    <p id="chatStatusLabel">Tu van truc tuyen</p>
                </div>
            </div>

            <button class="chat-close-btn" type="button" onclick="toggleChat()" aria-label="Dong chat">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="chat-warning-note d-none" id="chatGuestWarning">
            <i class="fas fa-exclamation-circle"></i>
            <span>Lich su chat se khong duoc luu khi ban roi khoi website.</span>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="chat-empty-state" id="chatEmptyState">
                <i class="fas fa-comments"></i>
                <p>Nhan tin de bat dau cuoc tro chuyen voi Spa ANA.</p>
            </div>
        </div>

        <div class="chat-error-message d-none" id="chatErrorMessage">
            Khong the gui tin nhan. Vui long thu lai sau
        </div>

        <form class="chat-footer" id="chatForm">
            <div class="chat-input-container">
                <textarea
                    class="chat-input"
                    id="chatInput"
                    rows="1"
                    placeholder="Nhap noi dung tin nhan..."
                ></textarea>
                <button class="chat-send-btn" id="chatSendBtn" type="submit" disabled aria-label="Gui tin nhan">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
window.chatWidgetConfig = {
    isAuthenticated: {% if user.is_authenticated %}true{% else %}false{% endif %},
    socketPath: "/ws/chat/customer/",
    guestWarningMessage: "Lich su chat se khong duoc luu khi ban roi khoi website.",
    sendErrorMessage: "Khong the gui tin nhan. Vui long thu lai sau",
    connectionErrorMessage: "Khong the ket noi chat. Vui long thu lai."
};
</script>
<script src="{% static 'js/chat-widget.js' %}"></script>
