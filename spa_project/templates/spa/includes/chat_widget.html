{% load static %}

<style>
/* ===== CHAT WIDGET CSS (INLINE) ===== */

.chat-widget-container {
    display: none;
}

.chat-widget-container.active {
    display: block;
}

.chat-box {
    position: fixed;
    bottom: 88px;
    right: 2rem;
    width: 320px; /* ✅ Giảm từ 400px → 320px */
    height: 420px; /* ✅ Giảm từ 560px → 420px */
    display: grid;
    grid-template-rows: auto auto 1fr auto auto;
    background: white;
    border-radius: 24px;
    box-shadow: 0 25px 70px rgba(30, 58, 95, 0.2);
    z-index: 1050;
    overflow: hidden;
}

.chat-header {
    background: linear-gradient(135deg, #1e3a5f, #2c5282);
    color: white;
    padding: 1.1rem 1.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-header-title {
    display: flex;
    align-items: center;
    gap: 0.85rem;
}

.chat-header-title i {
    font-size: 1.15rem;
    color: #d4a853;
}

.chat-header-title h6 {
    margin: 0;
    font-weight: 700;
    font-size: 1rem;
}

.chat-header-title p {
    margin: 0.15rem 0 0 0;
    font-size: 0.78rem;
    opacity: 0.85;
}

.chat-close-btn {
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.18);
    color: white;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.chat-warning-note {
    display: flex;
    gap: 0.65rem;
    align-items: flex-start;
    margin: 1rem 1rem 0 1rem;
    padding: 0.9rem 1rem;
    border-radius: 16px;
    background: rgba(212, 168, 83, 0.1);
    color: #7b5a00;
    font-size: 0.85rem;
    border: 1px solid rgba(212, 168, 83, 0.18);
}

.chat-messages {
    overflow-y: auto;
    padding: 0.85rem 1rem; /* ✅ Giảm padding */
    background: linear-gradient(180deg, #fbfcfe 0%, #f5f8fb 100%);
    display: flex;
    flex-direction: column;
    gap: 0.65rem; /* ✅ Giảm từ 0.9rem → 0.65rem */
    scroll-behavior: smooth; /* ✅ Thêm smooth scroll */
}

.chat-empty-state {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    color: #718096;
    text-align: center;
    padding: 2rem 1rem;
}

.chat-empty-state i {
    font-size: 2rem;
    color: #d4a853;
}

.chat-message {
    max-width: 78%; /* ✅ Giảm từ 84% → 78% */
    padding: 0.65rem 0.85rem; /* ✅ Giảm padding */
    border-radius: 18px;
    font-size: 0.9rem; /* ✅ Giảm font */
    line-height: 1.4; /* ✅ Giảm line-height */
    box-shadow: 0 2px 8px rgba(30, 58, 95, 0.08);
    white-space: pre-wrap;
    word-break: break-word;
}

.chat-message.customer {
    align-self: flex-end;
    background: linear-gradient(135deg, #d4a853, #f1c40f);
    color: white;
    border-bottom-right-radius: 4px;
    margin-left: auto; /* ✅ Dính sát phải */
}

.chat-message.admin {
    align-self: flex-start;
    background: white;
    color: #1e3a5f;
    border: 1px solid #e2e8f0;
    border-bottom-left-radius: 4px;
    margin-right: auto; /* ✅ Dính sát trái */
}

.chat-message.system {
    align-self: center;
    background: #edf2f7;
    color: #4a5568;
    text-align: center;
    max-width: 92%;
}

.chat-message-header {
    display: flex;
    justify-content: space-between;
    gap: 0.5rem;
    margin-bottom: 0.2rem; /* ✅ Giảm từ 0.35rem → 0.2rem */
    font-size: 0.68rem; /* ✅ Giảm font */
}

.chat-message-name {
    font-weight: 700;
}

.chat-message-time {
    opacity: 0.82;
}

.chat-message-status {
    margin-top: 0.45rem;
    font-size: 0.72rem;
    opacity: 0.88;
}

.chat-message.failed {
    border: 1px solid #e53e3e;
    box-shadow: none;
}

.chat-attachment {
    margin-top: 0.75rem;
    border-radius: 14px;
    overflow: hidden;
}

.chat-attachment img {
    display: block;
    width: 100%;
    max-width: 220px;
    border-radius: 14px;
}

.chat-attachment-file {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.75rem;
    border-radius: 14px;
    text-decoration: none;
    font-weight: 600;
    background: rgba(255, 255, 255, 0.16);
    color: inherit;
}

.chat-message.admin .chat-attachment-file {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
}

.chat-error-message {
    margin: 0 1rem 0.75rem 1rem;
    padding: 0.8rem 0.9rem;
    border-radius: 14px;
    background: #fed7d7;
    color: #9b2c2c;
    font-size: 0.88rem;
    font-weight: 600;
}

.chat-footer {
    padding: 0.75rem 1rem 1rem 1rem; /* ✅ Giảm padding-top */
    background: white;
}

.chat-input-container {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.6rem; /* ✅ Giảm từ 0.75rem → 0.6rem */
    align-items: flex-end;
}

.chat-input {
    min-height: 48px; /* ✅ Giảm từ 52px → 48px */
    max-height: 140px; /* ✅ Giảm từ 160px → 140px */
    border: 2px solid #edf2f7;
    border-radius: 18px; /* ✅ Giảm từ 20px → 18px */
    padding: 0.7rem 0.9rem; /* ✅ Giảm padding */
    resize: none;
    overflow-y: hidden;
    scrollbar-width: none;
    font-size: 0.92rem; /* ✅ Giảm font */
    line-height: 1.4; /* ✅ Giảm line-height */
}

.chat-input::-webkit-scrollbar {
    display: none;
}

.chat-input:focus {
    outline: none;
    border-color: #d4a853;
    box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.12);
}

.chat-send-btn {
    width: 48px; /* ✅ Giảm từ 52px → 48px */
    height: 48px;
    border: none;
    border-radius: 16px; /* ✅ Giảm từ 18px → 16px */
    background: linear-gradient(135deg, #d4a853, #f1c40f);
    color: white;
    box-shadow: 0 8px 18px rgba(212, 168, 83, 0.25);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
}

.chat-send-btn:disabled {
    opacity: 0.45;
    box-shadow: none;
    cursor: not-allowed;
}

.chat-send-btn:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 10px 22px rgba(212, 168, 83, 0.3);
}

.chat-floating-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    min-width: 22px;
    height: 22px;
    border-radius: 999px;
    background: #e53e3e;
    color: white;
    font-size: 0.72rem;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 0.35rem;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .chat-box {
        bottom: 0;
        right: 0;
        left: 0;
        width: 100%;
        height: 85vh; /* ✅ Tăng từ 82vh → 85vh */
        border-radius: 0;
    }

    .chat-header {
        border-radius: 0;
    }

    .chat-message {
        max-width: 85%; /* ✅ Mobile: tăng max-width */
    }
}

@media (max-width: 480px) {
    .chat-box {
        height: 90vh; /* ✅ Mobile nhỏ: tăng thêm height */
    }

    .chat-message {
        max-width: 88%; /* ✅ Mobile nhỏ: tăng thêm max-width */
        padding: 0.6rem 0.75rem;
        font-size: 0.88rem;
    }

    .chat-input {
        min-height: 44px;
        font-size: 0.9rem;
    }

    .chat-send-btn {
        width: 44px;
        height: 44px;
    }
}
</style>

<div class="chat-widget-container" id="chatWidgetContainer">
    <div class="chat-box">
        <div class="chat-header">
            <div class="chat-header-title">
                <i class="fas fa-spa"></i>
                <div>
                    <h6>Spa ANA</h6>
                    <p id="chatStatusLabel">Tư vấn trực tuyến</p>
                </div>
            </div>

            <button class="chat-close-btn" type="button" onclick="toggleChat()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="chat-warning-note d-none" id="chatGuestWarning">
            <i class="fas fa-exclamation-circle"></i>
            <span>Lịch sử chat sẽ không được lưu khi bạn rời khỏi website.</span>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="chat-empty-state" id="chatEmptyState">
                <i class="fas fa-comments"></i>
                <p>Nhắn tin để bắt đầu cuộc trò chuyện với Spa ANA.</p>
            </div>
        </div>

        <div class="chat-error-message d-none" id="chatErrorMessage">
            Không thể gửi tin nhắn. Vui lòng thử lại sau
        </div>

        <form class="chat-footer" id="chatForm">
            {% csrf_token %}
            <div class="chat-input-container">
                <textarea
                    class="chat-input"
                    id="chatInput"
                    rows="1"
                    placeholder="Nhập nội dung tin nhắn..."
                ></textarea>
                <button class="chat-send-btn" id="chatSendBtn" type="submit" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
window.chatWidgetConfig = {
    isAuthenticated: {% if user.is_authenticated %}true{% else %}false{% endif %},
    csrfToken: "{{ csrf_token }}",
    bootstrapUrl: "{% url 'chat:api_customer_chat_bootstrap' %}",
    sendUrlTemplate: "{% url 'chat:api_customer_chat_send' '__CHAT_CODE__' %}",
    readUrlTemplate: "{% url 'chat:api_customer_chat_mark_read' '__CHAT_CODE__' %}",
    streamUrlTemplate: "{% url 'chat:api_customer_chat_stream' '__CHAT_CODE__' %}",
    guestWarningMessage: "Lịch sử chat sẽ không được lưu khi bạn rời khỏi website.",
    sendErrorMessage: "Không thể gửi tin nhắn. Vui lòng thử lại sau"
};
</script>
<script src="{% static 'js/chat-widget.js' %}"></script>
