{% load static %}
<!-- Admin Sidebar -->
<nav class="admin-sidebar" id="sidebar">
    <div class="sidebar-header">
        <i class="fas fa-spa fa-2x mb-2" style="color: #E0B21B;"></i>
        <h3>Spa <span>ANA</span></h3>
    </div>
    
    <ul class="nav flex-column sidebar-nav">
        <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'admin_appointments' %}active{% endif %}" href="{% url 'spa:admin_appointments' %}">
                <i class="fas fa-calendar-check"></i>
                Quản lý lịch hẹn
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'admin_services' %}active{% endif %}" href="{% url 'spa:admin_services' %}">
                <i class="fas fa-spa"></i>
                Quản lý dịch vụ
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'admin_live_chat' %}active{% endif %}" href="{% url 'spa:admin_live_chat' %}">
                <i class="fas fa-comments"></i>
                Chat trực tuyến
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'admin_complaints' %}active{% endif %}" href="{% url 'spa:admin_complaints' %}">

            </a>
        </li>

        <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'admin_staff' %}active{% endif %}" href="{% url 'spa:admin_staff' %}">

            </a>
        </li>
        {% endif %}
        <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'admin_profile' %}active{% endif %}" href="{% url 'spa:admin_profile' %}">
                <i class="fas fa-user-cog"></i>

            </a>
        </li>

    <div class="sidebar-footer">
        <a href="{% url 'spa:admin_logout' %}" class="btn btn-logout logout-link">
