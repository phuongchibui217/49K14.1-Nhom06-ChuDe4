{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Chat Trực tuyến - Spa ANA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <style>
        .live-chat-container { display: flex; height: calc(100vh - 73px); background: white; }
        .chat-list-sidebar { width: 30%; min-width: 320px; background: #f7fafc; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; flex-shrink: 0; }
        .chat-list-header { padding: 1.25rem 1.5rem; background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%); border-bottom: 1px solid #e2e8f0; }
        .chat-list-title { font-size: 1.15rem; font-weight: 700; color: white; margin-bottom: 1rem; }
        .search-input { width: 100%; padding: 0.65rem 0.9rem 0.65rem 2.4rem; border: 1.5px solid rgba(255,255,255,0.2); border-radius: 999px; background: rgba(255,255,255,0.15); font-size: 0.9rem; color: white; }
        .search-input::placeholder { color: rgba(255,255,255,0.6); }
        .search-input:focus { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.3); outline: none; }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.6); font-size: 0.9rem; }
        .chat-list-container { flex: 1; overflow-y: auto; padding: 0.75rem; }
        .chat-list-item { display: flex; padding: 1rem; border: 1.5px solid transparent; border-radius: 16px; margin-bottom: 0.6rem; cursor: pointer; background: #f7fafc; transition: all 0.2s ease; }
        .chat-list-item:hover { border-color: #fbd38d; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(30, 58, 95, 0.08); background: #fffaf0; }
        .chat-list-item.active { background: linear-gradient(135deg, #fef3e2 0%, #fff9f0 100%); border-color: #f6ad55; box-shadow: 0 2px 8px rgba(212, 168, 83, 0.15); }
        .customer-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #d4a853, #f1c40f); display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
        .customer-avatar-initials { font-size: 1.25rem; font-weight: 700; color: white; }
        .customer-avatar-dot { position: absolute; bottom: 0; right: 0; width: 18px; height: 18px; background: #ef4444; border-radius: 50%; border: 2px solid white; font-size: 10px; font-weight: 700; color: white; display: flex; align-items: center; justify-content: center; }
        .chat-list-item-content { flex: 1; margin-left: 0.75rem; min-width: 0; }
        .customer-name { font-weight: 700; font-size: 0.95rem; color: #1e3a5f; margin-bottom: 0.25rem; }
        .last-message { font-size: 0.86rem; color: #4a5568; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 0.35rem; }
        .last-message-time { font-size: 0.75rem; color: #a0aec0; }
        .customer-tag { font-size: 0.7rem; color: #6c757d; background: #e9ecef; padding: 0.2rem 0.5rem; border-radius: 999px; margin-top: 0.25rem; display: inline-block; }
        .unread-badge { position: absolute; top: 10px; right: 10px; background: linear-gradient(135deg, #d4a853, #f1c40f); color: white; font-size: 0.75rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 999px; }
        .chat-window { flex: 1; display: flex; flex-direction: column; background: white; }
        .chat-window-header { display: flex; align-items: center; padding: 1.25rem 1.75rem; border-bottom: 1px solid #e2e8f0; background: linear-gradient(135deg, #f7fafc 0%, #fef3e2 100%); }
        .chat-customer-info { display: flex; align-items: center; gap: 0.75rem; flex: 1; }
        .customer-info-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #d4a853, #f1c40f); display: flex; align-items: center; justify-content: center; }
        .customer-info-avatar-initials { font-size: 1.15rem; font-weight: 700; color: white; }
        .customer-info-content { flex: 1; }
        .customer-meta { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #718096; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #48bb78; }
        .status-dot.offline { background: #cbd5e0; }
        .chat-action-btn { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 0.5rem 0.75rem; cursor: pointer; transition: all 0.2s ease; color: #4a5568; }
        .chat-action-btn:hover { background: #f7fafc; border-color: #cbd5e0; }
        .messages-area { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; background: #f8fafc; display: flex; flex-direction: column; gap: 0.5rem; scroll-behavior: smooth; }
        .message-bubble { max-width: 68%; padding: 1rem 1.25rem; border-radius: 20px; font-size: 1.25rem; line-height: 1.65; position: relative; box-shadow: 0 2px 8px rgba(30, 58, 95, 0.08); }
        .message-customer { align-self: flex-start; background: white; color: #2d3748; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .message-staff { align-self: flex-end; background: linear-gradient(135deg, #d4a853, #f1c40f); color: #1a1a1a; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(212, 168, 83, 0.25); }
        .message-time { font-size: 0.65rem; color: #a0aec0; margin-top: 0.25rem; text-align: right; opacity: 0.6; }
        .message-staff .message-time { color: rgba(0, 0, 0, 0.5); }
        .message-status { font-size: 0.65rem; color: #48bb78; margin-top: 0.1rem; text-align: right; }
        .chat-input-area { padding: 1.25rem 1.75rem; border-top: 1px solid #e2e8f0; background: white; }
        .input-wrapper { display: flex; gap: 0.75rem; align-items: flex-end; }
        .message-input { flex: 1; padding: 0.75rem 1rem; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 0.95rem; transition: all 0.2s ease; }
        .message-input:focus { border-color: #d4a853; outline: none; background: white; box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.1); }
        .attach-btn { background: #edf2f7; border: 1px solid #e2e8f0; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; color: #4a5568; transition: all 0.2s ease; }
        .attach-btn:hover { background: #e2e8f0; color: #2d3748; }
        .send-btn { background: linear-gradient(135deg, #d4a853, #f1c40f); color: #1a1a1a; border: none; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; box-shadow: 0 4px 12px rgba(212, 168, 83, 0.3); transition: all 0.2s ease; }
        .send-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(212, 168, 83, 0.4); }
        .no-chat-selected { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: #718096; padding: 2rem; }
        .no-chat-icon { font-size: 4rem; color: #d4a853; margin-bottom: 1.25rem; opacity: 0.6; }
        .system-message { background: #fef3e2; border-left: 4px solid #f6ad55; padding: 0.75rem 1rem; margin: 0.5rem 0; border-radius: 8px; font-size: 0.85rem; color: #744210; }
    </style>
</head>
<body>
    <div class="admin-layout">
        {% include 'manage/includes/sidebar.html' %}
        <div class="admin-content">
            <header class="admin-header">
                <div class="d-flex align-items-center">
                    <button class="btn btn-light me-3" id="sidebarToggle" style="display: none;"><i class="fas fa-bars"></i></button>
                    <h4 class="mb-0"><i class="fas fa-comments me-2" style="color: #d4a853;"></i>Chat Trực tuyến / CSKH</h4>
                </div>
            </header>
            <div class="live-chat-container">
                <!-- Chat List Sidebar -->
                <div class="chat-list-sidebar">
                    <div class="chat-list-header">
                        <h2 class="chat-list-title"><i class="fas fa-comments me-2" style="color: #fbd38d;"></i>Hội thoại</h2>
                        <div class="search-wrapper">
                            <i class="fas fa-search"></i>
                            <input type="text" class="search-input" id="searchInput" placeholder="Tìm kiếm khách hàng...">
                        </div>
                    </div>
                    <div class="chat-list-container" id="chatListContainer"></div>
                </div>
                <!-- Chat Window -->
                <div class="chat-window" id="chatWindow">
                    <div id="noChatView" style="display: flex; flex: 1;">
                        <div class="no-chat-selected">
                            <i class="fas fa-comments no-chat-icon"></i>
                            <p>Chọn hội thoại từ danh sách bên trái để bắt đầu</p>
                        </div>
                    </div>
                    <div class="chat-window-header" id="chatHeader" style="display: none;">
                        <div class="chat-customer-info">
                            <div class="customer-info-avatar"><span class="customer-info-avatar-initials" id="customerInitials">C</span></div>
                            <div class="customer-info-content">
                                <div class="customer-name" id="customerName">Khách hàng</div>
                                <div class="customer-meta">
                                    <div class="status-dot" id="statusDot"></div>
                                    <span id="lastMessageTime">--</span>
                                    <span class="customer-tag" id="customerTag" style="display: none;">Khách vãng lai</span>
                                </div>
                            </div>
                            <div class="d-flex gap-2">
                                <button class="chat-action-btn" onclick="endChat()" title="Kết thúc chat"><i class="fas fa-check"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="messages-area" id="messagesArea" style="display: none;"></div>
                    <div class="chat-input-area" id="chatInputArea" style="display: none;">
                        <div class="input-wrapper">
                            <button class="attach-btn" onclick="showAttachOptions()" title="Đính kèm"><i class="fas fa-paperclip"></i></button>
                            <input type="text" class="message-input" id="messageInput" placeholder="Nhập tin nhắn..." onkeypress="handleKeyPress(event)">
                            <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let activeChatId = null;
        let currentConversation = null;
        const mockConversations = [
            {id:1,customerId:'C001',customerName:'C001',customerInitials:'C',lastMessage:'Xin chào! Tôi muốn đặt lịch massage.',lastMessageTime:'10:30',unreadCount:0,status:'online',isGuest:false,messages:[{id:1,type:'staff',content:'Chào bạn! Tôi có thể giúp gì cho bạn?',time:'10:28'},{id:2,type:'customer',content:'Xin chào! Tôi muốn đặt lịch massage.',time:'10:30'}]},
            {id:2,customerId:'C002',customerName:'C002',customerInitials:'C',lastMessage:'Giá liệu trình chăm sóc da là bao nhiêu?',lastMessageTime:'09:15',unreadCount:2,status:'online',isGuest:false,messages:[{id:1,type:'customer',content:'Xin chào! Tôi muốn tư vấn dịch vụ.',time:'09:10'},{id:2,type:'staff',content:'Chào bạn! Tôi có thể giúp gì?',time:'09:12'},{id:3,type:'customer',content:'Giá liệu trình chăm sóc da là bao nhiêu?',time:'09:15'}]},
            {id:3,customerId:'GUEST001',customerName:'GUEST001',customerInitials:'G',lastMessage:'Tôi muốn biết giá dịch vụ.',lastMessageTime:'2 phút trước',unreadCount:5,status:'online',isGuest:true,messages:[{id:1,type:'customer',content:'Tôi muốn biết giá dịch vụ.',time:'14:05'}]},
        ];
        document.addEventListener('DOMContentLoaded',function(){loadChatList();});
        document.getElementById('sidebarToggle').addEventListener('click',function(){document.getElementById('sidebar').classList.toggle('show');});
        function loadChatList(){
            const container=document.getElementById('chatListContainer');container.innerHTML='';
            mockConversations.forEach(function(chat){
                const isActive=activeChatId===chat.id;
                const item=document.createElement('div');
                item.className='chat-list-item'+(isActive?' active':'')+(chat.unreadCount>0?' unread':'');
                item.innerHTML=`<div class="customer-avatar"><span class="customer-avatar-initials">${chat.customerInitials}</span>${chat.unreadCount>0?`<div class="customer-avatar-dot">${chat.unreadCount}</div>`:''}</div><div class="chat-list-item-content" style="flex:1;margin-left:12px;"><div class="customer-name">${chat.customerName}</div><div class="last-message">${chat.lastMessage}</div><div class="last-message-time">${chat.lastMessageTime}</div>${chat.isGuest?'<span class="customer-tag">Khách vãng lai</span>':''}</div>`;
                item.onclick=function(){loadConversation(chat.id);};
                container.appendChild(item);
            });
        }
        function loadConversation(id){
            activeChatId=id;
            currentConversation=mockConversations.find(c=>c.id===id);
            if(currentConversation){
                document.getElementById('noChatView').style.display='none';
                document.getElementById('chatHeader').style.display='flex';
                document.getElementById('chatInputArea').style.display='block';
                document.getElementById('messagesArea').style.display='flex';
                document.getElementById('customerInitials').textContent=currentConversation.customerInitials;
                document.getElementById('customerName').textContent=currentConversation.customerName;
                document.getElementById('lastMessageTime').textContent=currentConversation.lastMessageTime;
                document.getElementById('customerTag').style.display=currentConversation.isGuest?'inline-block':'none';
                const statusDot = document.getElementById('statusDot');
                statusDot.className = 'status-dot' + (currentConversation.status === 'offline' ? ' offline' : '');
                loadMessages(currentConversation.messages);
                currentConversation.unreadCount=0;
                loadChatList();
            }
        }
        function loadMessages(messages){
            const area=document.getElementById('messagesArea');area.innerHTML='';
            messages.forEach(function(msg){
                const div=document.createElement('div');
                div.className='message-bubble '+(msg.type==='staff'?'message-staff':'message-customer');
                div.innerHTML=`<div>${msg.content}</div><div class="message-time">${msg.time}</div>`;
                area.appendChild(div);
            });
            // Smooth scroll to bottom
            area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
        }
        function sendMessage(){
            const input=document.getElementById('messageInput');
            const msg=input.value.trim();
            if(!msg||!currentConversation)return;
            const newMsg={id:Date.now(),type:'staff',content:msg,time:new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})};
            currentConversation.messages.push(newMsg);
            currentConversation.lastMessage=msg;
            currentConversation.lastMessageTime=newMsg.time;
            loadMessages(currentConversation.messages);
            loadChatList();
            input.value='';
        }
        function handleKeyPress(e){if(e.key==='Enter')sendMessage();}
        function endChat(){if(currentConversation&&confirm('Kết thúc cuộc hội thoại này?')){currentConversation.status='offline';alert('Đã kết thúc hội thoại.');}}
        function showAttachOptions(){alert('Tính năng đính kèm file sẽ được cập nhật!');}
    </script>
</body>
</html>
